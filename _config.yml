# ─── Site Settings ────────────────────────────────────────────────────────────
title: Alex Lee's Blog
subtitle: "개인 블로그 & 프로젝트 문서 & 연구 노트"
description: "개인 블로그 & 프로젝트 문서 & 연구 노트"
baseurl: ""
url: "https://alexlee0213.github.io"
locale: "ko-KR"

# ─── Include ──────────────────────────────────────────────────────────────────
include:
  - _pages

# ─── Theme ────────────────────────────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.28.0"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# ─── Author ───────────────────────────────────────────────────────────────────
author:
  name: "Alex Lee"
  bio: "개발자 · 연구자"
  location: "Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alexlee0213"

# ─── Permalink ────────────────────────────────────────────────────────────────
permalink: /:categories/:year/:month/:day/:title/

# ─── Collections ──────────────────────────────────────────────────────────────
collections:
  research:
    output: true
    permalink: /research/:name/

# ─── Defaults ─────────────────────────────────────────────────────────────────
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  # Research
  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

# ─── Tag & Category Archives ─────────────────────────────────────────────────
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
